<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
:root{
  --bg:#0b0b0b;--c1:#111;--br:#1e1e1e;--br2:#2a2a2a;
  --tx:#ccc9c3;--mu:#555;--mu2:#888;
  --go:#8aaa52;--re:#b07838;--ac:#6a6a99;
  --serif:'Noto Serif JP',serif;--mono:'IBM Plex Mono',monospace;
  --touch:44px;
}
body.light{
  --bg:#f4f1ec;--c1:#ebe7e0;--br:#d8d3cb;--br2:#c8c3ba;
  --tx:#1e1c18;--mu:#999;--mu2:#777;
  --go:#5a8a2a;--re:#9a6020;--ac:#4a4a7a;
}
.theme-btn{
  background:transparent;border:none;color:var(--mu2);
  font-family:var(--mono);font-size:11px;padding:4px 6px;
  cursor:pointer;letter-spacing:1px;flex-shrink:0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--mono);background:var(--bg);color:var(--tx);font-size:15px;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;}
button{cursor:pointer;-webkit-appearance:none;appearance:none;border-radius:0;}
input,select{-webkit-appearance:none;appearance:none;border-radius:0;
  font-size:16px !important;-webkit-user-select:text;user-select:text;}
/* â•â• ANIMACIONES â•â• */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes logoIn{0%{opacity:0;transform:scale(0.88)}100%{opacity:1;transform:scale(1)}}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:0.65}}
@keyframes splashIn{0%{opacity:0;filter:blur(9px) contrast(145%)}70%{opacity:1;filter:blur(1px) contrast(115%)}100%{opacity:1;filter:blur(0) contrast(100%)}}
@keyframes splashGlow{0%,100%{text-shadow:none;opacity:1;filter:contrast(100%);}7%,8.2%{text-shadow:-2px 0 rgba(110,255,170,.68),2px 0 rgba(120,190,255,.52);opacity:.95;filter:contrast(112%);}8.3%,11.5%{text-shadow:none;opacity:1;filter:contrast(100%);}41%,42.2%{text-shadow:2px 0 rgba(110,255,170,.58),-2px 0 rgba(255,130,190,.48);opacity:.94;filter:contrast(110%);}42.3%,69%{text-shadow:none;opacity:1;filter:contrast(100%);}69.2%,70.1%{text-shadow:-2px 0 rgba(120,190,255,.45),2px 0 rgba(255,130,190,.38);opacity:.96;}70.2%,100%{text-shadow:none;opacity:1;filter:contrast(100%);}}
@keyframes nameLogoGlitch{0%,100%{text-shadow:none;filter:contrast(100%);}20%{text-shadow:-2px 0 rgba(110,255,170,.62),2px 0 rgba(120,190,255,.52);filter:contrast(112%);}45%{text-shadow:2px 0 rgba(110,255,170,.58),-2px 0 rgba(255,130,190,.46);filter:contrast(115%);}70%{text-shadow:-1px 0 rgba(120,190,255,.45),1px 0 rgba(255,130,190,.36);filter:contrast(108%);}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOnly{from{opacity:0}to{opacity:1}}
@keyframes entrarGlow{0%,100%{text-shadow:0 0 2px rgba(255,175,220,.18),0 0 8px rgba(255,130,200,.12);opacity:.82;transform:scale(1);}50%{text-shadow:0 0 6px rgba(255,190,230,.4),0 0 16px rgba(255,120,200,.28);opacity:.96;transform:scale(1.012);}}
@keyframes kiSparkRise{
  0%{
    transform:translate3d(calc(var(--drift,0px) * -0.18),0,0) scale(.92);
    opacity:0;
    background:var(--c0,rgba(190,220,206,.34));
    box-shadow:0 0 2px var(--g0,rgba(176,220,206,.34)),0 0 10px var(--g0,rgba(176,220,206,.34));
  }
  15%{
    opacity:var(--opa,.54);
    background:var(--c0,rgba(190,220,206,.34));
  }
  56%{
    opacity:calc(var(--opa,.54) * .95);
    background:var(--c1,rgba(248,106,84,.50));
    box-shadow:0 0 2px var(--g1,rgba(255,136,92,.44)),0 0 13px var(--g1,rgba(255,136,92,.44));
  }
  86%{
    opacity:.22;
    background:var(--c2,rgba(255,202,122,.30));
  }
  100%{
    transform:translate3d(var(--drift,0px),calc(-1 * var(--rise,250px)),0) scale(.54);
    opacity:0;
    background:var(--c2,rgba(255,202,122,.30));
    box-shadow:0 0 0 transparent;
  }
}
@keyframes logoPixelFall{
  0%{
    transform:translate3d(0,0,0) scale(1);
    opacity:1;
    background:var(--lc,#d7d6d1);
    box-shadow:none;
  }
  72%{
    opacity:1;
  }
  100%{
    transform:translate3d(var(--drift,0px),var(--fall,140px),0) scale(.6);
    opacity:1;
  }
}

.screen{display:none;flex-direction:column;height:100dvh;}
.screen.on{display:flex;animation:fadeIn 0.25s ease-out both;}
#splash-btn-load.entrar-glow{
  position:relative;animation:entrarGlow 2.2s ease-in-out infinite;color:#d7d6d1;
  background:transparent;border:none;padding:0;border-radius:0;letter-spacing:6px;z-index:2;isolation:isolate;
}
#splash-btn-load.entrar-glow::before,#splash-btn-load.entrar-glow::after{content:none;}
.entrar-sparks{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);width:228px;height:360px;pointer-events:none;overflow:visible;z-index:1;}
.entrar-spark{
  position:absolute;left:50%;bottom:0;width:var(--size,2.4px);height:var(--size,2.4px);border-radius:1px;
  background:var(--c0,rgba(190,220,206,.34));filter:blur(.03px);mix-blend-mode:screen;
  animation:kiSparkRise var(--dur,3.8s) linear forwards;will-change:transform,opacity,background;
}
.logo-drips-layer{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:1;}
.logo-pixel{
  position:absolute;width:var(--size,3.0px);height:var(--size,3.0px);border-radius:0;
  background:var(--lc,#d7d6d1);filter:none;mix-blend-mode:normal;
  animation:logoPixelFall var(--dur,2.4s) linear forwards;will-change:transform,opacity;
}

/* Splash (carga) — ordenado en móvil */
#splash-sym{top:42% !important;font-size:clamp(86px,24vw,142px) !important;transform:translate(-50%,-58%) !important;overflow:visible;}
#splash-name{top:calc(42% + 78px) !important;font-size:clamp(15px,4.2vw,22px) !important;letter-spacing:clamp(4px,1.8vw,10px) !important;padding:0 14px;}
#splash-status{top:calc(42% + 128px) !important;padding:0 18px;}
#splash-status-txt{min-height:14px;}
#splash-btn-load{
  margin-top:12px !important;min-height:auto;padding:0 !important;border:none !important;
  background:transparent !important;box-shadow:none !important;
  color:#d7d6d1 !important;font-family:'Noto Serif JP',serif !important;font-size:clamp(14px,3.8vw,20px) !important;
  font-weight:700 !important;letter-spacing:clamp(4px,1.5vw,9px) !important;text-transform:uppercase;
}
#splash-omit{
  margin-top:6px;background:transparent;border:none;color:var(--mu);
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;
  opacity:.8;padding:0;
}
@media (max-width:430px),(max-height:760px){
  #splash-sym{top:36% !important;font-size:clamp(72px,22vw,108px) !important;}
  #splash-name{top:calc(36% + 70px) !important;}
  #splash-status{top:auto !important;bottom:92px !important;}
  #splash-btn-load{width:auto;max-width:none;}
  #splash-welcome{padding:42px 20px 24px !important;}
  #splash-welcome input#splash-nombre{font-size:28px !important;}
}
/* S2 sin fade — ya está cargada, no queremos parpadeo al registrar */
#s2.on{animation:fadeOnly 0.2s ease-out both;}

/* Serie nueva en el log */
.lr{font-size:17px;color:#d4d4d4;display:flex;justify-content:space-between;
  gap:6px;align-items:baseline;padding:2px 0;
  animation:slideUp 0.2s ease-out both;}

/* Historial S0 — stagger */
.hist-item{display:flex;align-items:baseline;gap:7px;padding:8px 0;
  border-bottom:none;flex-wrap:nowrap;overflow:hidden;
  animation:fadeIn 0.3s ease-out both;}
.hist-item:nth-child(1){animation-delay:0.02s;}
.hist-item:nth-child(2){animation-delay:0.07s;}
.hist-item:nth-child(3){animation-delay:0.12s;}
.hist-item:nth-child(4){animation-delay:0.17s;}
.hist-item:nth-child(5){animation-delay:0.22s;}
.hist-item:nth-child(6){animation-delay:0.27s;}

/* Inputs — fade al activarse */
.inp-fields{opacity:.2;pointer-events:none;transition:opacity 0.3s ease;}
.inp-fields.active{opacity:1;pointer-events:auto;}

/* Botón registrar — pulso sutil al aparecer */
@keyframes pulseBtn{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.ab3.save{border-color:var(--re);color:var(--re);flex:1;animation:pulseBtn 0.4s ease-out 0.1s both;}

/* â•â• LOGO â•â• */
.s0-head{padding:14px 20px 12px;border-bottom:none;flex-shrink:0;
  display:flex;justify-content:center;align-items:center;gap:10px;}
.logo-wrap{display:flex;flex-direction:column;gap:2px;min-width:0;align-items:center;}
.logo-top{display:flex;align-items:center;justify-content:center;gap:10px;}
.logo-sym{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--tx);
  display:inline-block;
  animation:logoIn 0.5s ease-out forwards, breathe 5s ease-in-out 0.7s infinite;
  transition:opacity 0.4s;cursor:pointer;}
.logo-sym.flip{transform:rotateY(90deg);opacity:0;animation:none;}
.logo-name-main{font-family:var(--serif);font-size:24px;font-weight:700;letter-spacing:2px;color:var(--tx);line-height:1;}
.logo-text{font-family:var(--serif);font-size:12px;font-weight:700;letter-spacing:6px;
  color:var(--tx);text-transform:uppercase;}
.logo-db{font-size:9px;color:var(--mu2);font-family:var(--mono);letter-spacing:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.btn-db{background:transparent;border:1px solid var(--mu);color:var(--tx);
  padding:10px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;
  min-height:var(--touch);display:flex;align-items:center;}
#fi,#fi-rut{display:none;}
#global-brand{position:fixed;z-index:120;display:flex;align-items:center;gap:8px;
  top:10px;left:50%;transform:translateX(-50%);opacity:.92;transition:top .28s ease,right .28s ease,left .28s ease,bottom .28s ease,opacity .25s ease,transform .25s ease;
  pointer-events:auto;cursor:pointer;user-select:none;}
#global-brand-sym{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--tx);
  line-height:1;display:inline-block;animation:breathe 4.2s ease-in-out infinite;}
#global-brand-name{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:1px;color:var(--tx);text-transform:uppercase;white-space:nowrap;line-height:1;}
body.screen-s0 #global-brand{opacity:0;pointer-events:none;transform:translateY(-8px);}
body.screen-s1 #global-brand{top:10px;left:50%;right:auto;bottom:auto;opacity:.92;transform:translateX(-50%);}
body.screen-s2 #global-brand{top:10px;left:50%;right:auto;bottom:auto;opacity:.92;transform:translateX(-50%);}
body.screen-s3 #global-brand{top:10px;left:50%;right:auto;bottom:auto;opacity:.92;transform:translateX(-50%);}

/* â•â• S0 â•â• */
.s0-recovery{padding:6px 20px 0;flex-shrink:0;}
.home-rec-box{
  border:1px solid var(--br2);
  border-radius:10px;
  padding:8px 10px 9px;
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0));
}
.home-rec-line{
  display:flex;
  align-items:flex-start;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:5px;
}
.home-rec-line:last-child{margin-bottom:0;}
.home-rec-k{
  font-family:var(--mono);
  font-size:9px;
  color:var(--mu);
  letter-spacing:2px;
  text-transform:uppercase;
  min-width:70px;
  flex-shrink:0;
  line-height:1.45;
}
.home-rec-v{
  font-family:var(--mono);
  font-size:10px;
  color:var(--mu2);
  line-height:1.45;
  letter-spacing:.2px;
  flex:1;
  min-width:0;
}
.home-rec-muted{
  display:block;
  font-family:var(--mono);
  font-size:10px;
  color:var(--mu);
  letter-spacing:.4px;
}
.s0-mid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 20px 0;}
.hist-frame{
  border-top:1px solid var(--br2);
  border-left:1px solid var(--br);
  border-right:1px solid var(--br);
  border-bottom:1px solid var(--br);
  border-radius:10px;
  padding:8px 10px 6px;
  background:linear-gradient(180deg,rgba(255,255,255,.015),rgba(255,255,255,0));
}
.hist-title{
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:2.6px;
  text-transform:uppercase;
  color:var(--mu);
  padding:0 2px 7px;
  border-bottom:1px solid var(--br);
  margin-bottom:4px;
}
.sec-lbl{font-size:12px;letter-spacing:2px;color:var(--tx);font-weight:600;text-transform:uppercase;margin-bottom:14px;margin-top:14px;opacity:.95;}
.hi-date{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--tx);white-space:nowrap;flex-shrink:0;}.hist-empty{font-size:12px;color:var(--mu2);letter-spacing:1px;padding:16px 0;}
.hist-item{display:flex;flex-direction:column;align-items:stretch;gap:4px;padding:10px 0;overflow:hidden;border-bottom:1px solid var(--br);}
.hist-item:first-child{border-top:none;}
.hist-item:last-child{border-bottom:none;}
.hist-row{display:flex;align-items:baseline;gap:7px;min-width:0;}
.hist-row-bottom{align-items:center;}
.hi-date{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--tx);white-space:nowrap;flex-shrink:0;}
.hi-hora{font-size:10px;color:var(--mu);font-family:var(--mono);flex-shrink:0;}
.hi-type{font-size:13px;font-family:var(--serif);font-weight:700;white-space:nowrap;flex-shrink:0;}
.hi-sobre{font-size:11px;cursor:pointer;color:var(--mu2);flex-shrink:0;}
.hi-groups{font-size:11px;color:var(--mu2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;max-width:none;}
.hi-vol{font-size:10px;color:#67d8ff;font-family:var(--mono);letter-spacing:.2px;white-space:nowrap;margin-left:auto;flex-shrink:0;}
.hi-vol.inline{margin-left:4px;}
.s0-foot{padding:14px 20px 28px;border-top:none;flex-shrink:0;}
.ppl{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--br);}
.ppl-btn{background:var(--bg);border:none;padding:0;min-height:64px;
  display:flex;align-items:center;justify-content:center;}
.ppl-btn:active{background:var(--c1);}
.ppl-lbl{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:3px;}
.ppl-btn.pull .ppl-lbl{color:var(--go);}
.ppl-btn.push .ppl-lbl{color:var(--ac);}
.ppl-btn.legs .ppl-lbl{color:var(--re);}

/* â•â• S1 â•â• */
#s1{padding:24px 20px;gap:10px;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.s1-type{font-family:var(--serif);font-size:36px;font-weight:700;letter-spacing:4px;
  text-align:center;margin-bottom:4px;}
.s1-type.pull{color:var(--go);}
.s1-type.push{color:var(--ac);}
.s1-type.legs{color:var(--re);}
.opt-last,.s1-opt{background:transparent;border:1px solid var(--br2);color:var(--mu2);
  padding:14px;font-size:11px;letter-spacing:3px;text-transform:uppercase;
  font-family:var(--mono);width:100%;min-height:var(--touch);}
.opt-last{text-align:left;}
.s1-opt{text-align:center;}
.opt-last:active,.s1-opt:active{background:var(--c1);color:var(--tx);}
.s1-opt-card{display:flex;flex-direction:column;gap:2px;text-align:left;}
.s1-opt-main{font-size:11px;letter-spacing:2px;color:var(--tx);}
.s1-opt-sub{font-size:9px;color:var(--mu);font-family:var(--mono);letter-spacing:.3px;text-transform:none;}
.s1-opts{display:flex;flex-direction:column;gap:8px;width:100%;}
.rut-list{display:flex;flex-direction:column;gap:6px;width:100%;}
.rut-lbl{font-size:9px;letter-spacing:3px;color:var(--mu);text-transform:uppercase;margin-top:4px;}
.rut-item{display:flex;gap:6px;align-items:stretch;}
.rut-btn{flex:1;background:transparent;border:1px solid var(--br2);color:var(--mu2);
  padding:12px 14px;font-size:12px;font-family:var(--mono);text-align:left;min-height:var(--touch);}
.rut-btn:active{background:var(--c1);color:var(--tx);}
.rut-del{background:transparent;border:1px solid var(--br2);color:var(--mu);
  padding:12px 14px;font-size:16px;font-family:var(--mono);min-height:var(--touch);
  display:flex;align-items:center;}
.rut-del:active{color:var(--re);border-color:var(--re);}
.btn-back{background:transparent;border:none;color:var(--mu2);font-size:10px;
  letter-spacing:3px;text-transform:uppercase;font-family:var(--mono);
  padding:10px 4px;min-height:var(--touch);display:flex;align-items:center;}

/* â•â• S2 â•â• */
#s2{overflow:hidden;position:relative;}
.tbar{padding:8px 12px 8px;border-bottom:1px solid var(--br);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0));
  transition:background .25s ease,border-color .25s ease;}
.tnum{font-family:var(--mono);font-size:52px;font-weight:300;color:var(--mu);
  letter-spacing:-2px;min-width:88px;transition:color .3s,transform .2s ease;line-height:1;}
.work .tnum{color:var(--go);}
.rest .tnum{color:var(--re);}
.prep .tnum{color:var(--tx);}
.tinfo{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.tst{font-size:9px;letter-spacing:2.4px;text-transform:uppercase;color:var(--mu);transition:color .3s;background:transparent;border:1px solid var(--br2);padding:2px 8px;border-radius:999px;align-self:flex-start;}
.work .tst{color:var(--go);border-color:rgba(138,170,82,.45);}
.rest .tst{color:var(--re);border-color:rgba(176,120,56,.45);}
.thint{font-size:10px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
#s2.mode-idle .tbar{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0));}
#s2.mode-work .tbar{background:linear-gradient(180deg,rgba(138,170,82,.12),rgba(138,170,82,0));}
#s2.mode-rest .tbar{background:linear-gradient(180deg,rgba(176,120,56,.12),rgba(176,120,56,0));}
#s2.mode-saving .tbar{background:linear-gradient(180deg,rgba(200,168,75,.14),rgba(200,168,75,0));}
#s2.mode-work .tnum{transform:scale(1.02);}
.ttot{text-align:right;flex-shrink:0;}
.ttot-l{font-size:8px;letter-spacing:2px;color:var(--mu);}
.ttot-v{font-size:12px;color:var(--mu);}
.fin-dia-top{
  background:rgba(255,255,255,.02);border:1px solid var(--br2);color:var(--mu2);
  border-radius:999px;min-height:30px;min-width:124px;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:9px;letter-spacing:2.2px;
  text-transform:uppercase;padding:0 10px;opacity:.86;line-height:1;
  transition:border-color .2s ease,color .2s ease,background .2s ease;
}
.fin-dia-top:active{color:var(--re);opacity:1;border-color:rgba(176,120,56,.5);background:rgba(176,120,56,.08);}

/* día en la fila superior */
.ej-col-day{display:none;}
.btn-exit-bottom{width:100%;background:transparent;border:none;color:var(--mu);
  font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);
  padding:8px 0;margin-top:4px;display:flex;align-items:center;justify-content:center;}

.workout-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.ej-col{border-right:none;border-bottom:1px solid var(--br);overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;display:flex;flex-direction:row;align-items:stretch;
  white-space:nowrap;scrollbar-width:none;min-height:64px;}
.ej-col::-webkit-scrollbar{display:none;}
.eq-item{padding:8px 10px 7px;border-bottom:none;border-right:1px solid var(--br);cursor:pointer;
  min-height:56px;min-width:132px;display:flex;flex-direction:column;justify-content:center;
  position:relative;flex-shrink:0;opacity:.78;
  transition:background .2s ease,border-color .2s ease,transform .2s ease,opacity .2s ease;}

// Cronómetro de trabajo: m:ss.d (décimas pequeñas)
const fmtT=(ms)=>{
  const s=Math.floor(ms/1000);
  const m=Math.floor(s/60);
  const ss=s%60;
  const d=Math.floor((ms%1000)/100);
  return `${m}<span style="display:inline-block;letter-spacing:0;margin:0 -1px;">:</span>${String(ss).padStart(2,'0')}<span style="font-size:0.34em;opacity:0.64;margin-left:1px;">.${d}</span>`;

  const dt=new Date(iso+'T12:00:00');

  const m=dt.getMonth()+1;
  return `${dia.charAt(0).toUpperCase()+dia.slice(1,3)} ${d}/${m}`;
};

function ejNameKey(n){
  return (n||'').toString().toLowerCase().normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
}

const EJ_CANON_BY_KEY={};
ALL_EJS.forEach(n=>{EJ_CANON_BY_KEY[ejNameKey(n)]=n;});
Object.entries(EJ_NAME_ALIAS).forEach(([k,v])=>{EJ_CANON_BY_KEY[ejNameKey(k)]=v;});

function canonicalEjName(n){
  const raw=(n||'').toString().trim();
  if(!raw)return raw;
  return EJ_CANON_BY_KEY[ejNameKey(raw)]||raw;
}

function dedupeNamesStable(arr){
  const seen=new Set();
  const out=[];
  (arr||[]).forEach(n=>{
    const key=ejNameKey(n);
    if(!key||seen.has(key))return;
    seen.add(key);
    out.push(n);
  });
  return out;
}

function normalizeEjList(list){
  return dedupeNamesStable((list||[]).map(canonicalEjName).filter(Boolean));
}

function cleanModalEjName(n){
  return (n||'').toString().replace(/\s*\([^\)]*\)\s*/g,' ').replace(/\s+/g,' ').trim();
}

function buildModalPresetList(list){
  const seen=new Set();
  const out=[];
  (list||[]).forEach(n=>{
    const clean=cleanModalEjName(n);
    const key=ejNameKey(clean);
    if(!key||seen.has(key))return;
    seen.add(key);
    out.push(clean);
  });
  return out;
}


function normalizeEjTiposMap(m){
  const out={};
  Object.entries(m||{}).forEach(([k,v])=>{out[canonicalEjName(k)]=v;});
  return out;
}

function normalizeEjAgarresMap(m){
  const out={};
  Object.entries(m||{}).forEach(([k,v])=>{
    const name=canonicalEjName(k);
    const grip=(v||'').toString().trim().toLowerCase();
    if(!name||!grip)return;
    out[name]=grip;
  });
  return out;
}

function normalizeExercisesMap(exercises){
  const out={};
  Object.entries(exercises||{}).forEach(([name,series])=>{
    const canon=canonicalEjName(name);
    if(!canon)return;
    if(!out[canon])out[canon]=[];
    (Array.isArray(series)?series:[]).forEach((s,idx)=>{
      const row=(s&&typeof s==='object')?{...s}:{};
      if(!row.serie)row.serie=out[canon].length+1;
      out[canon].push(row);
    });
  });
  Object.keys(out).forEach(name=>{
    out[name]=out[name].map((s,i)=>({...s,serie:i+1}));
  });
  return out;
}

function normalizeDbData(db){
  const src=(db&&typeof db==='object')?db:{};
  const out={...src};

  out.history=Array.isArray(src.history)?src.history.map(h=>{
    const row={...(h||{})};
    row.exercises=normalizeExercisesMap(row.exercises||{});
    row.ejTipos=normalizeEjTiposMap(row.ejTipos||{});
    row.ejAgarres=normalizeEjAgarresMap(row.ejAgarres||{});
    return row;
  }):[];

  const recs={};
  const dateScore=v=>{const t=Date.parse(v||'');return Number.isNaN(t)?0:t;};
  Object.entries(src.ejercicios||{}).forEach(([name,rec])=>{
    const canon=canonicalEjName(name);
    const row=(rec&&typeof rec==='object')?{...rec}:{};
    row.series=Array.isArray(row.series)?row.series.map((s,i)=>({...(s||{}),serie:(s&&s.serie)||i+1})):[];
    if(row.byGrip&&typeof row.byGrip==='object'){
      const byGrip={};
      Object.entries(row.byGrip).forEach(([g,gr])=>{
        const grip=normalizedGripValue(g);
        const grRow=(gr&&typeof gr==='object')?{...gr}:{};
        grRow.series=Array.isArray(grRow.series)?grRow.series.map((s,i)=>({...(s||{}),serie:(s&&s.serie)||i+1})):[];
        if(grip)byGrip[grip]=grRow;
      });
      row.byGrip=byGrip;
    }
    const prev=recs[canon];
    if(!prev||dateScore(row.fecha)>=dateScore(prev.fecha))recs[canon]=row;
  });
  out.ejercicios=recs;

  const rut={};
  Object.entries(src.rutinas||{}).forEach(([k,val])=>{
    const parts=String(k).split(':');
    const type=parts.shift()||'';
    const name=parts.join(':');
    rut[`${type}:${name}`]=normalizeEjList(Array.isArray(val)?val:[]);
  });
  out.rutinas=rut;

  const namesFromHistory=[];
  out.history.forEach(h=>{namesFromHistory.push(...Object.keys(h.exercises||{}));});
  const namesFromEj=Object.keys(out.ejercicios||{});
  const namesFromRut=Object.values(out.rutinas||{}).flat();
  const allCandidate=[...(Array.isArray(src.allEjs)?src.allEjs:[]),...ALL_EJS,...namesFromHistory,...namesFromEj,...namesFromRut]
    .map(canonicalEjName).filter(Boolean);
  out.allEjs=dedupeNamesStable(allCandidate);

  return out;
}

function compactGreekGlyphs(text){
  const out=[];
  const seen=new Set();
  for(const ch of (text||'')){
    if(ch===' '){out.push(ch);continue;}
    if(seen.has(ch))continue;
    seen.add(ch);
    out.push(ch);
  }
  return out.join('');
}
function toGreek(n){
  const src=(n||'').trim().toLowerCase();
  if(!src)return '';
  if(GREEK_NAME_OVERRIDES[src])return GREEK_NAME_OVERRIDES[src];
  const plain=src.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ñ/g,'n');
  const m={
    a:'\u0391',b:'\u0392',c:'\u039A',d:'\u0394',e:'\u0395',f:'\u03A6',g:'\u0393',
    h:'\u0397',i:'\u0399',j:'\u0399',k:'\u039A',l:'\u039B',m:'\u039C',n:'\u039D',
    o:'\u039F',p:'\u03A0',q:'\u039A',r:'\u03A1',s:'\u03A3',t:'\u03A4',u:'\u03A5',
    v:'\u0392',w:'\u03A9',x:'\u039E',y:'\u03A5',z:'\u0396'
  };
  const mapped=plain.split('').map(ch=>m[ch]??ch.toUpperCase()).join('');
  return compactGreekGlyphs(mapped);
}
const GLYPH_POOL='ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ0123456789';
const _nameDriftControllers=new WeakMap();

function stopNameDrift(el){
  if(!el)return;
  const ctrl=_nameDriftControllers.get(el);
  if(ctrl){ctrl.stop();_nameDriftControllers.delete(el);}
}

function startNameDrift(el, baseText, opts={}){
  if(!el)return;
  stopNameDrift(el);

  const cfg={minMs:2600,maxMs:5600,holdMs:180,doubleChance:0.16,...opts};
  const target=(baseText||'').split('');
  if(!target.length){el.textContent='';return;}

  const visibleIdx=target.map((c,i)=>(c.trim()?i:-1)).filter(i=>i>=0);
  const rand=(a,b)=>Math.floor(a+Math.random()*(b-a+1));
  const randGlyph=(ex)=>{
    for(let i=0;i<10;i++){
      const ch=GLYPH_POOL[Math.floor(Math.random()*GLYPH_POOL.length)];
      if(ch!==ex)return ch;
    }
    return ex;
  };

  let stopped=false;
  let t1=null,t2=null;

  const schedule=()=>{
    if(stopped||!el.isConnected)return;
    const wait=rand(cfg.minMs,cfg.maxMs);
    t1=setTimeout(()=>{
      if(stopped||!el.isConnected)return;
      const cur=[...target];
      if(visibleIdx.length){
        const i1=visibleIdx[Math.floor(Math.random()*visibleIdx.length)];
        cur[i1]=randGlyph(cur[i1]);
        if(Math.random()<cfg.doubleChance&&visibleIdx.length>1){
          let i2=i1;
          while(i2===i1)i2=visibleIdx[Math.floor(Math.random()*visibleIdx.length)];
          cur[i2]=randGlyph(cur[i2]);
        }
      }
      el.textContent=cur.join('');

      t2=setTimeout(()=>{
        if(stopped||!el.isConnected)return;
        el.textContent=target.join('');
        schedule();
      },cfg.holdMs);
    },wait);
  };

  el.textContent=target.join('');
  schedule();

  _nameDriftControllers.set(el,{
    stop:()=>{
      stopped=true;
      if(t1)clearTimeout(t1);
      if(t2)clearTimeout(t2);
    }
  });
}

function startNameDualPulse(el, greekText, realText){
  if(!el)return;
  stopNameDrift(el);

  const greek=(greekText||'').toUpperCase();
  const real=(realText||'').toUpperCase();
  if(!greek){el.textContent='';return;}

  const rand=(a,b)=>Math.floor(a+Math.random()*(b-a+1));
  const glitchPool='ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ01#@%*';

  let stopped=false;
  let t1=null,t2=null,t3=null,t4=null;

  const tick=()=>{
    if(stopped||!el.isConnected)return;
    const wait=rand(3200,6200);
    t1=setTimeout(()=>{
      if(stopped||!el.isConnected)return;

      // Pre-glitch estilo logo antes de mostrar nombre real
      el.style.animation='nameLogoGlitch 0.34s steps(1,end) 1';

      t2=setTimeout(()=>{
        if(stopped||!el.isConnected)return;
        el.style.animation='';
        el.style.textShadow='0 0 10px rgba(255,180,230,.28)';
        el.textContent=real||greek;

        // mini defecto matrix y retorno al griego
        t3=setTimeout(()=>{
          if(stopped||!el.isConnected)return;
          const base=(real||greek).split('');

          if(base.length){
            const i=Math.floor(Math.random()*base.length);
            const keep=base[i];
            base[i]=glitchPool[Math.floor(Math.random()*glitchPool.length)];
            el.textContent=base.join('');

            t4=setTimeout(()=>{
              if(stopped||!el.isConnected)return;
              base[i]=keep;
              el.textContent=greek;
              el.style.textShadow='';
              tick();
            },90);
          } else {
            el.textContent=greek;
            el.style.textShadow='';
            tick();
          }
        },520);
      },340);
    },wait);
  };

  el.textContent=greek;
  tick();

  _nameDriftControllers.set(el,{
    stop:()=>{
      stopped=true;
      if(t1)clearTimeout(t1);
      if(t2)clearTimeout(t2);
      if(t3)clearTimeout(t3);
      if(t4)clearTimeout(t4);
      el.style.textShadow='';
      el.style.animation='';
    }
  });
}

function loadDB(evt){
  _lastDbLoadOk=false;
  const f=evt.target.files[0];if(!f)return;
  // Sin fade global al cargar DB (pedido del usuario).
  const r=new FileReader();
  r.onload=e=>{
    let parsed=null;
    try{
      parsed=JSON.parse(e.target.result);
    }catch(err){
      alert('Archivo inválido: JSON');
      return;
    }

    try{
      const base=buildInitialDb();
      DB=normalizeDbData({
        ...base,
        ...(parsed||{}),
        rutinas:{...(base.rutinas||{}),...((parsed||{}).rutinas||{})},
        allEjs:[...(base.allEjs||[]),...((parsed||{}).allEjs||[])]
      });
      if(!Array.isArray(DB.history))DB.history=[];
      if(!DB.rutinas||typeof DB.rutinas!=='object')DB.rutinas={};
      if(!DB.ejercicios||typeof DB.ejercicios!=='object')DB.ejercicios={};
      if(!Array.isArray(DB.allEjs))DB.allEjs=[];
    }catch(err){
      alert('Archivo inválido: estructura');
      return;
    }

    if(DB.allEjs)DB.allEjs.forEach(n=>{if(!allEjsKnown.includes(n))allEjsKnown.push(n);});

    try{applyTheme(DB.theme==='light');}catch(_e){}
    try{
      const dbLoaded=$('db-loaded');
      if(dbLoaded)dbLoaded.textContent='↑ '+f.name;
    }catch(_e){}
    try{updateGreet();}catch(_e){}
    try{showMsgManana();}catch(_e){}
    try{startNameFlicker();}catch(_e){}
    try{
      const spName=$('splash-name');
      if(spName&&DB.usuario){
        spName.textContent=toGreek(DB.usuario);
        spName.style.opacity='1';
      }
      if(!DB.usuario){
        const sw=$('splash-welcome');
        if(sw){
          sw.style.display='flex';
          setTimeout(()=>{ const sn=$('splash-nombre');if(sn)sn.focus(); },300);
        } else if($('modal-nombre')){
          $('nombre-in').value='';
          $('modal-nombre').classList.add('on');
        }
      }
    }catch(_e){}

    try{renderHome();}catch(_e){}
    try{saveAutoDb();}catch(_e){}
    _lastDbLoadOk=true;
  };
  r.readAsText(f);evt.target.value='';
}

function grupoDeEj(n){
  const canon=canonicalEjName(n);
  return EJ_GRUPOS[canon]||EJ_GRUPOS[n]||"Otros";
}
function mevTargetForMuscle(m){return MEV_TARGET_BY_MUSCLE[m]||MEV_DEFAULT_TARGET;}
function mevIsEffectiveSet(s){
  if(!s||s.deleted)return false;
  const reps=Number(s.reps)||0;
  if(reps<=0)return false;
  const raw=String(s.rpe??'').trim().toUpperCase();
  if(!raw)return true; // fallback: si no hay RIR cargado, cuenta como serie efectiva
  if(raw==='F'||raw==='A')return true;
  if(raw.startsWith('RIR')){
    const n=parseInt(raw.replace(/[^\d-]/g,''),10);
    return Number.isFinite(n)?n<=3:true;
  }
  const n=parseInt(raw,10);
  if(!Number.isFinite(n))return true;
  if(n>=7&&n<=10)return true; // compatibilidad con versión vieja (RPE alta)
  return n<=3; // formato actual (RIR 0-4)
}
function fmtSetCount(v){
  const n=Math.round((Number(v)||0)*10)/10;
  return Number.isInteger(n)?String(n):n.toFixed(1);
}
function muscleLoadsForExercise(name){
  const canon=canonicalEjName(name);
  const key=ejNameKey(canon);
  const g=grupoDeEj(canon);
  const has=(...tokens)=>tokens.some(t=>key.includes(t));
  let loads=null;

  if(has('farmer walk')){
    loads=[{m:'Antebrazos',w:1},{m:'Trapecios',w:0.5},{m:'Core',w:0.4}];
  }else if(has('peso muerto convencional')){
    loads=[{m:'Espalda',w:0.6},{m:'Glúteo',w:0.6},{m:'Isquios',w:0.6},{m:'Trapecios',w:0.4}];
  }else if(has('peso muerto rumano','camilla isquios','seated leg curl','isquios')){
    loads=[{m:'Isquios',w:1},{m:'Glúteo',w:0.5}];
  }else if(has('hip thrust','patada de gluteo','abductores','abductor')){
    loads=[{m:'Glúteo',w:1},{m:'Isquios',w:0.35}];
  }else if(has('sentadilla','prensa','zancada','cuadriceps','leg extension','sillon cuadriceps')){
    loads=[{m:'Cuádriceps',w:1},{m:'Glúteo',w:0.55},{m:'Isquios',w:0.3}];
  }else if(has('jalon','remo','dominad','pullover','espinal','hyperext')){
    loads=[{m:'Espalda',w:1},{m:'Bíceps',w:0.5}];
  }else if(has('press militar','press arnold','hombro','vuelos','face pull','deltoide')){
    loads=[{m:'Hombros',w:1},{m:'Tríceps',w:0.4}];
  }else if(has('press de banca','press inclinado','press declinado','press plano','aperturas','cruce','pec deck')){
    loads=[{m:'Pecho',w:1},{m:'Tríceps',w:0.35},{m:'Hombros',w:0.25}];
  }else if(has('fondos')){
    loads=[{m:'Pecho',w:0.7},{m:'Tríceps',w:0.6},{m:'Hombros',w:0.3}];
  }else if(has('triceps','tricep','press frances','rompecraneos','extension soga','press cerrado')){
    loads=[{m:'Tríceps',w:1}];
  }else if(has('biceps','curl')){
    loads=[{m:'Bíceps',w:1}];
  }else if(has('plancha','abdominal','crunch','pallof','dead bug','bird dog','russian twist','hollow')){
    loads=[{m:'Core',w:1}];
  }else if(has('gemelo')){
    loads=[{m:'Gemelos',w:1}];
  }

  if(!loads){
    switch(g){
      case 'Pecho': loads=[{m:'Pecho',w:1},{m:'Tríceps',w:0.35},{m:'Hombros',w:0.25}];break;
      case 'Espalda': loads=[{m:'Espalda',w:1},{m:'Bíceps',w:0.45}];break;
      case 'Cuádriceps': loads=[{m:'Cuádriceps',w:1},{m:'Glúteo',w:0.35}];break;
      case 'Glúteo': loads=[{m:'Glúteo',w:1},{m:'Isquios',w:0.35}];break;
      case 'Isquios': loads=[{m:'Isquios',w:1},{m:'Glúteo',w:0.35}];break;
      case 'Hombros': loads=[{m:'Hombros',w:1},{m:'Tríceps',w:0.2}];break;
      case 'Tríceps': loads=[{m:'Tríceps',w:1}];break;
      case 'Bíceps': loads=[{m:'Bíceps',w:1}];break;
      case 'Core': loads=[{m:'Core',w:1}];break;
      case 'Gemelos': loads=[{m:'Gemelos',w:1}];break;
      case 'Trapecios': loads=[{m:'Trapecios',w:1}];break;
      case 'Aductores': loads=[{m:'Aductores',w:1}];break;
      case 'Antebrazos': loads=[{m:'Antebrazos',w:1}];break;
      default: loads=[{m:g||'Otros',w:1}];
    }
  }

  const merged={};
  loads.forEach(({m,w})=>{
    if(!m||!Number.isFinite(Number(w)))return;
    merged[m]=(merged[m]||0)+Number(w);
  });
  return Object.entries(merged).map(([m,w])=>({m,w}));
}
function mevDateInWindow(iso,days=MEV_WINDOW_DAYS){
  if(!iso)return false;
  const d=new Date(`${iso}T12:00:00`);
  if(Number.isNaN(d.getTime()))return false;
  const now=new Date();
  const a=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  const b=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();
  const diff=Math.floor((a-b)/86400000);
  return diff>=0&&diff<days;
}
function mevSeriesTimestamp(sessionMeta,s){
  const ts=Number(s?.ts);
  if(Number.isFinite(ts)&&ts>0)return ts;
  const st=Date.parse(sessionMeta?.startTime||'');
  if(!Number.isNaN(st))return st;
  const d=String(sessionMeta?.date||'').trim();
  if(d){
    const dt=new Date(`${d}T12:00:00`).getTime();
    if(!Number.isNaN(dt))return dt;
  }
  return Date.now();
}
function mevAccumulateExercises(exercises,sessionMeta,acc,latest){
  Object.entries(exercises||{}).forEach(([ej,series])=>{
    const loads=muscleLoadsForExercise(ej);
    if(!loads.length)return;
    (Array.isArray(series)?series:[]).forEach(s=>{
      if(!mevIsEffectiveSet(s))return;
      const ts=mevSeriesTimestamp(sessionMeta,s);
      loads.forEach(({m,w})=>{
        acc[m]=(acc[m]||0)+w;
        if(!latest[m]||ts>latest[m])latest[m]=ts;
      });
    });
  });
}
function musclesInCurrentWorkout(){
  const set=new Set();
  (ejList||[]).forEach(n=>muscleLoadsForExercise(n).forEach(({m})=>set.add(m)));
  return [...set].filter(Boolean);
}

}

  if(count>target.max)return 'var(--ac)';

function renderMevInline(muscles,counts,limit){
  const ord=[...muscles].sort((a,b)=>(counts[b]||0)-(counts[a]||0));
  const max=Math.max(1,limit||3);
  const head=ord.slice(0,max).map(m=>{
    const c=counts[m]||0;
    const tg=mevTargetForMuscle(m);
    const color=mevStatusColor(c,tg);
    return `<span style="color:${color}">${mevShortMuscle(m)} ${fmtSetCount(c)}/${tg.min}-${tg.max}</span>`;
  }).join(' · ');
  if(ord.length>max)return `${head} <span style="color:var(--mu2)">+${ord.length-max}</span>`;
  return head;
}
function renderMevFull(muscles,counts){
  return muscles.map(m=>{
    const c=counts[m]||0;
    const tg=mevTargetForMuscle(m);
    const color=mevStatusColor(c,tg);
    return `<span style="color:${color}">${m} ${fmtSetCount(c)}/${tg.min}-${tg.max}</span>`;
  }).join(' · ');
}
function recoveryColor(hours){
  if(hours<RECOVERY_HOURS_WARN)return 'var(--re)';
  if(hours<RECOVERY_HOURS_OK)return 'var(--ac)';
  return 'var(--go)';
}
function renderRecoveryInline(muscles,latestTs,limit){
  const rows=muscles.map(m=>{
    const ts=latestTs[m];
    if(!ts)return null;
    return {m,h:Math.max(0,(Date.now()-ts)/3600000)};
  }).filter(Boolean).sort((a,b)=>a.h-b.h);
  if(!rows.length)return '';
  const max=Math.max(1,limit||2);
  const head=rows.slice(0,max).map(r=>
    `<span style="color:${recoveryColor(r.h)}">${mevShortMuscle(r.m)} ${Math.round(r.h)}h</span>`
  ).join(' · ');
  if(rows.length>max)return `REC ${head} <span style="color:var(--mu2)">+${rows.length-max}</span>`;
  return `REC ${head}`;
}
function renderRecoveryFull(muscles,latestTs){
  return muscles.map(m=>{
    const ts=latestTs[m];
    if(!ts)return `<span style="color:var(--mu)">${m} —</span>`;
    const h=Math.max(0,(Date.now()-ts)/3600000);
    return `<span style="color:${recoveryColor(h)}">${m} ${Math.round(h)}h</span>`;
  }).join(' · ');
}

function splitRutinaKey(key){
  const parts=String(key||'').split(':');
  const type=(parts.shift()||'').trim().toLowerCase();
  const name=parts.join(':').trim().replace(/\s+/g,' ');
  return {type,name};
}

function rutinaNormKey(key){
  const p=splitRutinaKey(key);
  return `${p.type}:${p.name.toLowerCase()}`;
}

function sameRutinaExercises(a,b){
  const aa=normalizeEjList(Array.isArray(a)?a:[]);
  const bb=normalizeEjList(Array.isArray(b)?b:[]);
  if(aa.length!==bb.length)return false;
  for(let i=0;i<aa.length;i++){
    if(canonicalEjName(aa[i])!==canonicalEjName(bb[i]))return false;
  }
  return true;
}

function loadRutina(evt){
  const f=evt.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const p=JSON.parse(e.target.result);
      const typeData=p[curType];
      if(!typeData)throw new Error('Sin datos para '+curType);
      let ejs=[],name=curType.toUpperCase();
      if(typeData.a&&typeData.b){ejs=typeData.a.ejs||[];name=typeData.a.name;}
      else if(typeData.ejs){ejs=typeData.ejs;name=typeData.name||name;}
      else if(typeData.a){ejs=typeData.a.ejs||[];name=typeData.a.name;}
      else if(typeData.b){ejs=typeData.b.ejs||[];name=typeData.b.name;}
      if(!ejs.length)throw new Error('Sin ejercicios');
      startWorkout(name,ejs,curType,{},{},{});
    }catch(err){alert('Error: '+err.message);}
  };
  r.readAsText(f);evt.target.value='';
}

function startWorkout(name,ejs,dayId,tiposIniciales,multsIniciales,agarresIniciales){
  stopPrepCountdown();
  curDay={name,id:dayId};
  ejList=[...ejs];
  ejTipos={...tiposIniciales};
  ejAgarres={...agarresIniciales};
  ejMultipliers={...multsIniciales};
  // Si no viene mult, inferir desde tipo
  ejList.forEach(n=>{
    if(!ejMultipliers[n])ejMultipliers[n]=defaultMult(ejTipos[n]||'maq');
  });
  sesion={};ejList.forEach(n=>{sesion[n]=[];});
  ejFinalizados={};
  curEjIdx=0;state='idle';sec=0;msec=0;totalSec=0;started=false;startTime=null;tW="—";tR="—";
  sessionPersisted=false;
  clearInterval(iv);clearInterval(totalIv);iv=null;totalIv=null;
  $('tnum').innerHTML=fmtT(0);$('ttot').textContent=fmtTotal(0);
  
  $('clock').className='tbar';
  const ftop=$('btn-fin-top');if(ftop)ftop.style.display='none';
  $('inp-fields').className='inp-fields';
  buildEjCol();
  if(ejList.length>0){loadEj(0);refreshEjRestDisplay();}
  else{
    $('ej-n').textContent='Agregá ejercicios con +';
    $('ej-prev').innerHTML='';
    $('ej-log').innerHTML='';
    const mchip=$('ej-mult-chip');if(mchip)mchip.style.display='none';
  }
  renderAr();
  updateLiveVol();
  syncS2StateUi();
  startDraftAutoSave();
  saveSessionDraft(true);
  show('s2');
}

function buildEjCol(){
  const el=$('ej-col');
  const dayHeader='' ;
  el.innerHTML=dayHeader+ejList.map((n,i)=>{

    const cur=i===curEjIdx;
    const sc=sesion[n]?sesion[n].length:0;
    const tipo=ejTipos[n]||'maq';
    const grip=activeGripForExercise(n);
    const cls=cur?'cur':done?'done':'';
    const nLow=n.toLowerCase();
    const red={manc:['mancuerna'],barra:['barra'],maq:['máquina','maquina'],polea:['polea'],pc:[]}[tipo]||[];
    const showTipo=!red.some(p=>nLow.includes(p));
    const meta=[showTipo?TIPO_SHORT[tipo]:'',sc?`${sc}s`:''].filter(Boolean).join('·');
    const hasTimer=!!ejRestTimers[n]&&i!==curEjIdx; // no mostrar en activo
    const timerSec=hasTimer?ejRestTimers[n].sec:0;
    const gripChip=grip?` <span style="font-size:9px;color:var(--ac);font-family:var(--mono);letter-spacing:.5px;">· ${fmtGripLabel(grip)}</span>`:'';

function loadEj(i){
  curEjIdx=i;
  const name=ejList[i];
  const tipo=ejTipos[name]||'maq';
  const grip=activeGripForExercise(name);
  const mult=ejMultipliers[name]||1;
  const gripTag=grip?` · ${fmtGripLabel(grip)}`:'';
  $('ej-n').innerHTML=`${name} <span style="font-size:9px;color:var(--mu2);letter-spacing:2px;font-family:var(--mono)">${TIPO_SHORT[tipo]}${gripTag}</span>`;
  const mchip=$('ej-mult-chip');
  if(mchip){
    mchip.textContent=`×${mult}`;
    mchip.style.display='inline-flex';
    mchip.classList.toggle('on',mult===2);
  }
  buildKgWheels(tipo);
  // Buscar series anteriores: primero en ejercicios DB, luego en historial
  const ejRecBase=(DB.ejercicios||{})[name];
  const ejRec=getEjRecForActiveGrip(name);
  const gripFromRec=activeGripForExercise(name);
  let prev='<span style="color:var(--mu)">sin datos previos</span>';
  if(ejRec?.series&&ejRec.series.length){
    prev=ejRec.series.map((s,j)=>{
      if(s.kg)return `${s.kg}×${s.reps}`;
      if(s.reps)return `${s.reps}r`;
      return '—';
    }).join('<span style="color:#444"> · </span>')+` <span style="color:#555;font-size:12px">${ejRec.fecha||''}</span>${gripFromRec?` <span style="color:var(--ac);font-size:11px">· ${fmtGripLabel(gripFromRec)}</span>`:''}`;
  } else {
    for(const h of DB.history){
      const ex=h.exercises&&h.exercises[name];
      if(ex&&ex.length){
        let filtered=[...ex];
        if(gripFromRec){
          const histGrip=normalizedGripValue(h.ejAgarres&&h.ejAgarres[name]);
          if(histGrip){
            if(histGrip!==gripFromRec)continue;
          } else {
            filtered=ex.filter(s=>normalizedGripValue(s&&s.grip)===gripFromRec);
            if(!filtered.length)continue;
          }
        }
        prev=filtered.map((s,j)=>{
          if(s.kg)return `${s.kg}×${s.reps}`;
          if(s.reps)return `${s.reps}r`;
          return '—';
        }).join('<span style="color:#444"> · </span>')+` <span style="color:#555;font-size:12px">${h.date}</span>${gripFromRec?` <span style="color:var(--ac);font-size:11px">· ${fmtGripLabel(gripFromRec)}</span>`:''}`;
        break;
      }
    }
  }
  $('ej-prev').innerHTML=prev;
  // Sobre con nota previa del ejercicio
  const notaEj=ejRecBase?.notaEj||null;
  const sobreDrop=$('ej-sobre-drop');
  const sobreIco=$('ej-sobre-ico');
  const sobreTxt=$('ej-sobre-txt');
  if(notaEj){
    if(sobreTxt)sobreTxt.textContent=notaEj;
    if(sobreDrop)sobreDrop.style.display='block'; // empieza abierto
    if(sobreIco)sobreIco.style.display='inline';
  } else {
    if(sobreDrop)sobreDrop.style.display='none';
    if(sobreIco)sobreIco.style.display='none';
  }
  renderLog();buildEjCol();
}

function fmtRirLabel(v){
  if(v===null||v===undefined||v==='')return '';
  const raw=String(v).trim().toUpperCase();
  if(raw==='F')return '✕F';
  if(raw==='A')return 'AYUDA';
  if(raw==='10')return 'RIR 0';
  if(raw==='9')return 'RIR 1';
  if(raw==='8')return 'RIR 2';
  if(raw==='7')return 'RIR 3';
  if(raw.startsWith('RIR'))return raw.replace(/\s+/g,' ');
  if(/^-?\d+$/.test(raw))return `RIR ${raw}`;
  return raw;
}

function renderLog(){
  if(curEjIdx<0||!ejList[curEjIdx])return;
  const name=ejList[curEjIdx];
  const tipo=ejTipos[name]||'maq';
  const klbl=TIPO_LABEL[tipo];
  const series=sesion[name]||[];
  const el=$('ej-log');
  if(!series.length){el.innerHTML='';return;}
  const last=series.length-1;
  el.innerHTML=series.map((s,idx)=>{
    const kstr=s.kg?`${s.kg}${klbl}×${s.reps}`:(s.reps?`${s.reps}r`:'—');
    const multStr=s.mult&&s.mult>1?` <span style="color:var(--go)">×${s.mult}</span>`:'';
    let l=`<span class="lv">S${s.serie}</span> ${kstr}${multStr}`;
    if(s.rpe)l+=` <span style="color:var(--mu2)">${fmtRirLabel(s.rpe)}</span>`;
    if(s.helped)l+=` <span style="color:var(--ac)">+${s.helped}</span>`;
    if(s.dskg)l+=` DS${s.dskg}×${s.dsreps}`;
    if(s.nota)l+=`<br><span style="font-size:12px;color:var(--mu2)">${s.nota}</span>`;
    // Solo la última fila anima
    const anim=idx===last?'animation:slideUp 0.22s ease-out both':'animation:none';
    return `<div class="lr" style="${anim}"><span>${l}</span><span class="lt">T:${s.tWork} D:${s.tRest}</span></div>`;
  }).join('');
  // Scroll al final
  el.scrollTop=el.scrollHeight;
}

function updateLiveVol(){

function stopPrepCountdown(){
  if(prepIv){clearInterval(prepIv);prepIv=null;}
  prepLeft=0;

function startPrepCountdown(name){
  if(prepIv)return;
  prepFromState=(state==='rest')?'rest':'idle';
  prepBaseRestMs=(prepFromState==='rest')?msec:0;
  prepLeft=Math.max(1,PREP_COUNTDOWN_SEC|0);

  clearInterval(iv);iv=null;
  state='prep';
  const clock=$('clock');if(clock)clock.className='tbar prep';
  const tnum=$('tnum');if(tnum)tnum.innerHTML=String(prepLeft);
  const fo=$('focus-overlay');
  const ft=$('focus-tnum');
  const fb=$('focus-btn');
  if(fo)fo.style.display='flex';
  if(ft){ft.style.color='var(--tx)';ft.innerHTML=String(prepLeft);}
  if(fb)fb.style.display='none';
  renderAr();
  saveSessionDraft(true);

  prepIv=setInterval(()=>{
    prepLeft-=1;
    if(prepLeft>0){
      const t=$('tnum');if(t)t.innerHTML=String(prepLeft);
      if(ft)ft.innerHTML=String(prepLeft);
      renderAr();
      return;
    }
    stopPrepCountdown();
    const waitMs=prepBaseRestMs+(PREP_COUNTDOWN_SEC*1000);
    tR=fmt(Math.floor(waitMs/1000));
    state='work';
    if(clock)clock.className='tbar work';
    msec=0;
    const t2=$('tnum');if(t2)t2.innerHTML=fmtT(0);
    clearInterval(iv);iv=setInterval(tick,10);
    if(!started){
      started=true;
      startTime=new Date().toISOString();
      totalIv=setInterval(tickT,1000);
    }
    $('inp-fields').className='inp-fields';
    clearEjRest(name);
    if(fo){
      fo.style.display='flex';
      if(fb)fb.style.display='flex';
      if(ft){ft.style.color='var(--go)';ft.innerHTML=fmtT(0);}
    }
    renderAr();
    saveSessionDraft(true);
  },1000);
}

/* â•â• TIMER DE DESCANSO POR EJERCICIO â•â•
   Cada ejercicio tiene su propio contador que sigue corriendo
   aunque cambies a otro ejercicio en el medio. */
let ejRestTimers={};

function startEjRest(name){
  if(!ejRestTimers[name])ejRestTimers[name]={sec:0,ms:0,iv:null};
  const t=ejRestTimers[name];
  clearInterval(t.iv);
  t.sec=0;t.ms=0;
  t.iv=setInterval(()=>{
    t.ms+=100;
    if(t.ms%1000===0)t.sec++;
    if(ejList[curEjIdx]===name) refreshEjRestDisplay();
    else refreshColTimer(name); // actualizar pestaña en col
    if(t.sec===90) pulseEjTimer();
  },100);
  refreshEjRestDisplay();
}

function pulseEjTimer(){
  const el=$('ej-rest-timer');
  if(!el)return;
  el.classList.add('pulse');
  setTimeout(()=>el.classList.remove('pulse'),3000);
}

function clearEjRest(name){
  if(ejRestTimers[name]){
    clearInterval(ejRestTimers[name].iv);
    delete ejRestTimers[name];
  }
  if(!name||ejList[curEjIdx]===name) refreshEjRestDisplay();
}

function clearAllEjRest(){
  Object.values(ejRestTimers).forEach(t=>clearInterval(t.iv));
  ejRestTimers={};
  refreshEjRestDisplay();
}

function refreshEjRestDisplay(){
  const name=ejList[curEjIdx];
  const t=name?ejRestTimers[name]:null;
  const el=$('ej-rest-timer');
  const finBtn=$('btn-ej-fin');
  const hasSeries=!!name&&(sesion[name]||[]).some(s=>s&&!s.deleted&&(Number(s.reps)||Number(s.kg)||s.rpe||s.helped||s.nota||s.dskg||s.dsreps));
  const alreadyFinished=!!(name&&ejFinalizados[name]);
  const canFinish=!!name&&(state==='idle'||state==='rest')&&hasSeries&&!alreadyFinished;
  if(finBtn)finBtn.style.display=canFinish?'inline-flex':'none';
  if(t){
    if(el){
      el.style.display='block';
      const s=t.sec;
      el.textContent=fmt(s);
      el.style.color='#c8a84b';
    }
    const rt=$('reg-rest-timer');if(rt)rt.textContent=fmt(t.sec);
  } else {
    if(el){el.style.display='none';el.textContent='00:00';}
    const rt=$('reg-rest-timer');if(rt)rt.textContent='00:00';
  }
}

let _regStepTs=0;

function getKgStep(){
  const name=ejList[curEjIdx];
  const tipo=ejTipos[name]||'maq';
  const steps={manc:1,barra:2.5,polea:2.5,maq:5,pc:0};
  return steps[tipo]||2.5;
}

function buildSelectRange(start,end,step){
  const out=[];
  for(let v=start;v<=end+1e-9;v+=step){
    const norm=Math.round(v*100)/100;
    out.push(String(norm));
  }
  return out;
}

function fillSelect(elId,values,placeholder){
  const el=$(elId);if(!el)return;
  const prev=el.value;
  el.innerHTML=`<option value="">${placeholder}</option>`+values.map(v=>`<option value="${v}">${v}</option>`).join('');
  if(prev&&values.includes(prev))el.value=prev;
}

function prepareRegisterPickers(){
  const name=ejList[curEjIdx];
  const tipo=ejTipos[name]||'maq';
  const kgStep=getKgStep();
  const kgMax=tipo==='maq'?300:(tipo==='barra'?260:180);
  const kgVals=tipo==='pc'?[]:buildSelectRange(kgStep,kgMax,kgStep);
  fillSelect('reg-kg',kgVals,'KG');
  fillSelect('reg-dskg',kgVals,'DROP KG');
  fillSelect('reg-reps',buildSelectRange(1,30,1),'REPS');
  fillSelect('reg-helped',buildSelectRange(1,5,1),'AYUDA');
  const rirOpts=[
    {v:'F',label:'FALLO'},
    {v:'0',label:'RIR 0'},
    {v:'1',label:'RIR 1'},
    {v:'2',label:'RIR 2'},
    {v:'3',label:'RIR 3'},
    {v:'4',label:'RIR 4'}
  ];
  const rirSel=$('reg-rir');
  if(rirSel){
    const prev=rirSel.value;
    rirSel.innerHTML='<option value="">RIR</option>'+rirOpts.map(o=>`<option value="${o.v}">${o.label}</option>`).join('');
    if(prev&&rirOpts.some(o=>o.v===prev))rirSel.value=prev;
  }
  fillSelect('reg-dsreps',buildSelectRange(1,20,1),'DROP REPS');
}

function regStep(id, delta){
  // Debounce — evitar doble toque
  const now=Date.now();
  if(now-_regStepTs<250){return;}
  _regStepTs=now;
  const el=$(id);if(!el)return;
  const cur=parseFloat(el.value)||0;
  const step=id.includes('kg')?getKgStep():1;
  const nv=Math.max(0,Math.round((cur+delta)/step)*step);
  el.value=nv||'';
}

  else if(ql.includes('mancuerna')||ql.includes('martillo')||ql.includes('vuelo')||ql.includes('serrucho'))setTipoModal('manc',$('tb-manc'));
  else if(ql.includes('barra')||ql.includes('press de banca')||ql.includes('remo en t'))setTipoModal('barra',$('tb-barra'));

function finishW(){
  if(!started){exitW();return;}
  if(!confirm('¿Terminaste el día?'))return;

  stopPrepCountdown();
  clearInterval(iv);
  clearInterval(totalIv);
  clearAllEjRest();

  const finClock=$('fin-clock');
  if(finClock) finClock.textContent=fmt(totalSec);
  const finDay=$('fin-day');
  if(finDay) finDay.textContent=(curDay&&curDay.name)?curDay.name:'DÍA';
  const finName=$('fin-name');
  if(finName){
    const g=DB.usuario?toGreek(DB.usuario):'';
    finName.textContent=g||'Ω';
  }
  const finSym=$('fin-sym');
  if(finSym) finSym.textContent='Ω';

  // Volumen total
  let vol=0;
  for(const ej of ejList){
    (sesion[ej]||[]).filter(s=>!s.deleted).forEach(s=>{
      vol+=(s.kg||0)*(s.reps||0)*(s.mult||1);
    });
  }

  const volEl=$('fin-vol');
  if(volEl) volEl.textContent=vol>0?`vol ${vol.toLocaleString('es-AR')} kg`:'';

  // Comparar con sesión anterior del mismo tipo
  const compEl=$('fin-vol-comp');
  if(compEl){
    const prev=DB.history.find(h=>h.dayId&&h.dayId.startsWith(curType)&&h.volTotal);
    if(prev&&prev.volTotal&&vol>0){
      const diff=vol-prev.volTotal;
      const pct=Math.round((diff/prev.volTotal)*100);
      const sign=diff>=0?'+':'';
      compEl.textContent=`${sign}${pct}% vs anterior`;
      compEl.style.color=diff>=0?'var(--go)':'var(--re)';
    } else {
      compEl.textContent='';
    }
  }
  const notaIn=$('nota-sesion');
  if(notaIn) notaIn.value='';

  metaSec=1800;
  clearInterval(metaIv);
  const metaTimer=$('meta-timer');
  if(metaTimer) metaTimer.textContent='30:00';
  metaIv=setInterval(()=>{
    if(metaSec<=0){clearInterval(metaIv);return;}
    metaSec--;
    const m=$('meta-timer');
    if(m) m.textContent=fmt(metaSec);
  },1000);

  persistCurrentSessionToDb(true);
  clearSessionDraft();
  stopDraftAutoSave();
  renderFinBody();
  updateBackupInfo();
  show('s3');
}
function renderFinBody(){
  let html='';
  for(const name of ejList){
    const s=sesion[name];if(!s||!s.length)continue;
    const ejRec=getEjRecForActiveGrip(name);
    const prevPRkg=(ejRec?.pr_kg?.val)||0;
    const grip=activeGripForExercise(name);
    const gripTag=grip?` <span style="font-size:10px;color:var(--ac);font-family:var(--mono);letter-spacing:.6px;">· ${fmtGripLabel(grip)}</span>`:'';
    const seriesHtml=s.map((r,idx)=>{
      const kstr=r.kg?r.kg+'kg×'+r.reps:(r.reps?r.reps+'r':'—');
      let t=`S${r.serie}: ${kstr}`;
      if(r.mult&&r.mult>1)t+=` ×${r.mult}`;
      if(r.rpe)t+=` ${fmtRirLabel(r.rpe)}`;
      if(r.helped)t+=` +${r.helped}`;
      if(r.dskg)t+=` DS${r.dskg}×${r.dsreps}`;
      if(r.nota)t+=` — ${r.nota}`;
      // PR check
      const serieKg=(r.kg||0)*(r.mult||1);
      const isPR=serieKg>0&&serieKg>prevPRkg;
      const prTag=isPR?` <span style="color:var(--go);font-size:10px">PR</span>`:'';
      const del=r.deleted?' deleted':'';
      return `<div class="fin-serie${del}">
        <button class="fin-serie-del" onclick="toggleSerieDelete('${name.replace(/'/g,"\\'").replace(/"/g,'\\"')}',${idx})">⊘</button>
        <span class="fej-l" style="flex:1">${t}${prTag}</span>
      </div>`;
    }).join('');
    html+=`<div class="fej">
      <div class="fej-n">${name}${gripTag}</div>
      ${seriesHtml}
    </div>`;
  }
  $('fin-body').innerHTML=html||'<div style="color:var(--mu);font-size:11px">sin series</div>';
}

function toggleSerieDelete(name,idx){
  if(!sesion[name]||!sesion[name][idx])return;
  sesion[name][idx].deleted=!sesion[name][idx].deleted;
  renderFinBody();
  saveSessionDraft(true);
}

function askName(def){return prompt('Nombre del archivo:',def);}
function dlBlob(blob,filename){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();}

async function shareOnly(blob,name,mime){
  const file=new File([blob],name,{type:mime});
  // Web Share API — funciona en móvil (iOS Safari, Android Chrome)
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:name});return;}
    catch(e){if(e.name==='AbortError')return;}
  }
  // Fallback: clipboard en desktop
  if(mime.includes('text')){
    try{const t=await blob.text();await navigator.clipboard.writeText(t);alert('Copiado al portapapeles');}
    catch{dlBlob(blob,name);}
  } else dlBlob(blob,name);
}

function buildCSV(){
  const active=ej=>sesion[ej]?sesion[ej].filter(s=>!s.deleted):[];
  let csv='fecha;dia;ejercicio;tipo;mult;serie;kg;reps;rpe;helped;ds_kg;ds_reps;ds_rpe;nota;t_trabajo;t_descanso;descanso_real_seg\n';
  for(const ej of ejList){
    const series=active(ej);
    series.forEach((s,idx)=>{
      // descanso_real: diferencia de timestamps con la serie anterior del mismo ejercicio
      let descReal='';
      if(idx>0&&series[idx-1].ts&&s.ts){
        descReal=Math.round((s.ts-series[idx-1].ts)/1000);
      }
      csv+=[today(),curDay.name,`"${ej}"`,s.tipo||'',s.mult||1,s.serie,
        s.kg??'',s.reps??'',s.rpe??'',s.helped??'',
        s.dskg??'',s.dsreps??'',s.dsrpe??'',
        s.nota?`"${s.nota}"`:'',s.tWork,s.tRest,descReal].join(';')+'\n';
    });
  }
  return csv;
}

function buildDbExportObject(){

  return normalizeDbData({
    ...DB,
    msgManana:msgMananaNow,
    allEjs:[...new Set([...(DB.allEjs||[]),...allEjsKnown])],
    theme:DB.theme||'dark'
  });
}
function jsonBytes(obj){
  try{return new Blob([JSON.stringify(obj)]).size||0;}
  catch(_e){return 0;}
}
function fmtBytes(n){
  const v=Math.max(0,Number(n)||0);
  if(v<1024)return `${v} B`;
  if(v<1024*1024)return `${(v/1024).toFixed(1)} KB`;
  return `${(v/(1024*1024)).toFixed(2)} MB`;
}
function updateBackupInfo(){
  const el=$('backup-info');
  if(!el)return;
  const size=jsonBytes(buildDbExportObject());
  let level='',msg='';
  if(size>=3.5*1024*1024){
    level='high';
    msg=`JSON ${fmtBytes(size)} · alto: exportá JSON ahora y limpiá historial viejo.`;
  }else if(size>=2*1024*1024){
    level='warn';
    msg=`JSON ${fmtBytes(size)} · recomendado: backup hoy y revisión de historial.`;
  }else{
    msg=`JSON ${fmtBytes(size)} · sugerido: backup semanal en Drive.`;
  }
  el.className=`backup-info${level?` ${level}`:''}`;
  el.textContent=msg;
}

function isStorageQuotaError(err){
  const name=String(err&&err.name||'');
  const msg=String(err&&err.message||'');
  return name==='QuotaExceededError'||name==='NS_ERROR_DOM_QUOTA_REACHED'||/quota|storage/i.test(msg);
}
function notifyStorageQuota(){
  if(_storageQuotaWarned)return;
  _storageQuotaWarned=true;
  alert('Memoria local llena. Exportá JSON/CSV para no perder datos.');
}

}

function hasSessionDraftData(){
  if(!curDay||!Array.isArray(ejList)||!ejList.length)return false;
  return true;
}
function saveSessionDraft(force){
  try{
    if(!force&&!hasSessionDraftData()){
      localStorage.removeItem(SESSION_DRAFT_KEY);
      return false;
    }
    if(!curDay)return false;
    const draft={
      v:1,
      ts:Date.now(),
      user:DB.usuario||null,
      curType,
      curDay,
      ejList:[...ejList],
      sesion:JSON.parse(JSON.stringify(sesion||{})),
      ejTipos:{...ejTipos},
      ejAgarres:{...ejAgarres},
      ejFinalizados:{...ejFinalizados},
      ejMultipliers:{...ejMultipliers},
      curEjIdx,
      state,
      sec,msec,totalSec,
      tW,tR,
      started,
      startTime
    };
    localStorage.setItem(SESSION_DRAFT_KEY,JSON.stringify(draft));
    return true;
  }catch(_e){
    if(isStorageQuotaError(_e))notifyStorageQuota();
    return false;
  }
}
function clearSessionDraft(){
  try{localStorage.removeItem(SESSION_DRAFT_KEY);}catch(_e){}
}
function startDraftAutoSave(){
  if(_draftAutoIv)clearInterval(_draftAutoIv);
  _draftAutoIv=setInterval(()=>saveSessionDraft(false),5000);
}
function stopDraftAutoSave(){

}
function tryRestoreSessionDraft(){
  try{
    const raw=localStorage.getItem(SESSION_DRAFT_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(!d||!d.curDay||!Array.isArray(d.ejList)||!d.ejList.length)return false;
    if(d.user&&DB.usuario&&String(d.user)!==String(DB.usuario))return false;
    if(d.ts&&(Date.now()-Number(d.ts)>(1000*60*60*72)))return false;

    curDay=d.curDay;
    curType=d.curType||(String(curDay.id||'').split(':')[0]||curType);
    ejList=[...d.ejList];
    sesion=(d.sesion&&typeof d.sesion==='object')?d.sesion:{};
    ejTipos=(d.ejTipos&&typeof d.ejTipos==='object')?d.ejTipos:{};
    ejAgarres=(d.ejAgarres&&typeof d.ejAgarres==='object')?d.ejAgarres:{};
    ejFinalizados=(d.ejFinalizados&&typeof d.ejFinalizados==='object')?{...d.ejFinalizados}:{};
    ejMultipliers=(d.ejMultipliers&&typeof d.ejMultipliers==='object')?d.ejMultipliers:{};
    curEjIdx=Math.max(0,Math.min(parseInt(d.curEjIdx,10)||0,Math.max(0,ejList.length-1)));
    state=['idle','rest','saving','work'].includes(d.state)?d.state:'rest';
    if(state==='work'||state==='saving')state='rest';
    sec=Number.isFinite(Number(d.sec))?Number(d.sec):0;
    msec=Number.isFinite(Number(d.msec))?Number(d.msec):0;
    totalSec=Number.isFinite(Number(d.totalSec))?Number(d.totalSec):0;
    tW=d.tW||'—';
    tR=d.tR||'—';
    started=!!d.started||totalSec>0||Object.values(sesion||{}).some(v=>Array.isArray(v)&&v.length>0);
    startTime=d.startTime||null;
    sessionPersisted=false;

    clearInterval(iv);iv=null;
    clearInterval(totalIv);totalIv=null;
    if(started){
      totalIv=setInterval(tickT,1000);
    }

    const tnum=$('tnum');if(tnum)tnum.innerHTML=fmtT(msec||0);
    const ttot=$('ttot');if(ttot)ttot.textContent=fmtTotal(totalSec||0);
    const clock=$('clock');if(clock)clock.className='tbar '+(state==='rest'?'rest':'');

    buildEjCol();
    if(ejList.length>0)loadEj(curEjIdx);
    renderAr();
    syncS2StateUi();
    updateLiveVol();
    show('s2');
    startDraftAutoSave();
    showSaveToast('sesion recuperada');
    return true;
  }catch(_e){return false;}
}
function persistCurrentSessionToDb(withToast){
  if(sessionPersisted||!started||!curDay)return false;

  const exercises={};
  for(const ej of ejList){
    const s=(sesion[ej]||[]).filter(r=>!r.deleted);
    if(s.length)exercises[ej]=s;
  }

  let volTotal=0;
  for(const ej of ejList){
    (sesion[ej]||[]).filter(r=>!r.deleted).forEach(s=>{
      volTotal+=(s.kg||0)*(s.reps||0)*(s.mult||1);
    });
  }

  const newSes={
    date:today(),
    dayId:curDay.id,
    dayName:curDay.name,
    totalSec,
    startTime,
    volTotal,
    nota:null,
    exercises,
    ejTipos:{...ejTipos},
    ejAgarres:{...ejAgarres}
  };

  DB.history=[newSes,...(DB.history||[])];

  const ejData={...(DB.ejercicios||{})};
  for(const ej of ejList){
    const series=(sesion[ej]||[]).filter(r=>!r.deleted&&r.reps);
    if(!series.length)continue;
    const maxKgSerie=series.reduce((mx,s)=>{
      const v=(s.kg||0)*(s.mult||1);
      return v>mx?v:mx;
    },0);
    const bestSerie=series.find(s=>(s.kg||0)*(s.mult||1)===maxKgSerie)||null;
    const rec=(ejData[ej]&&typeof ejData[ej]==='object')?{...ejData[ej]}:{};
    const todayIso=today();

    const prevPRBase=(rec.pr_kg?.val)||0;
    const pr_kg=maxKgSerie>prevPRBase
      ? {val:maxKgSerie,kg:bestSerie?.kg,fecha:todayIso}
      : (rec.pr_kg||null);

    rec.series=series;
    rec.fecha=todayIso;
    rec.pr_kg=pr_kg;

    const tipo=ejTipos[ej]||'maq';
    const grip=activeGripForExercise(ej);
    if(tipoAllowsGrip(tipo)&&grip){
      const byGrip=(rec.byGrip&&typeof rec.byGrip==='object')?{...rec.byGrip}:{};
      const prevGrip=(byGrip[grip]?.pr_kg?.val)||0;
      const prGrip=maxKgSerie>prevGrip
        ? {val:maxKgSerie,kg:bestSerie?.kg,fecha:todayIso}
        : (byGrip[grip]?.pr_kg||null);
      byGrip[grip]={series,fecha:todayIso,pr_kg:prGrip};
      rec.byGrip=byGrip;
    }

    ejData[ej]=rec;
  }

  DB.ejercicios=ejData;
  DB.allEjs=[...new Set([...(DB.allEjs||[]),...allEjsKnown,...ejList])];
  DB.msgManana=$('msg-manana-out')?.value.trim()||DB.msgManana||null;
  DB=normalizeDbData(DB);
  allEjsKnown=[...new Set([...(DB.allEjs||[]),...ALL_EJS])];
  sessionPersisted=true;
  saveAutoDb();
  if(withToast)showSaveToast('ok guardado');
  return true;
}

let _entrarSparkTimer=null;
let _logoPixelTimer=null;
let _logoPixelGlitchTimers=[];
function stopEntrarSparks(){
  if(_entrarSparkTimer){
    clearTimeout(_entrarSparkTimer);
    _entrarSparkTimer=null;
  }
  const om=getSplashEnterBtn();
  const host=om?.querySelector?.('.entrar-sparks');

}
function stopLogoPixelFall(){
  if(_logoPixelTimer){
    clearTimeout(_logoPixelTimer);
    _logoPixelTimer=null;
  }
  if(_logoPixelGlitchTimers&&_logoPixelGlitchTimers.length){
    _logoPixelGlitchTimers.forEach(t=>clearTimeout(t));
    _logoPixelGlitchTimers=[];
  }
  const splash=$('splash');
  const host=splash?.querySelector?.('.logo-drips-layer');
  if(host)host.remove();
}
function startLogoPixelFall(){
  const splash=$('splash');
  const sym=$('splash-sym');
  if(!splash||!sym)return;
  stopLogoPixelFall();
  const host=document.createElement('span');
  host.className='logo-drips-layer';
  splash.appendChild(host);
  const rand=(a,b)=>a+Math.random()*(b-a);
  const logoTone='#d7d6d1';
  const cycleMs=6200; // igual a splashGlow 6.2s
  const glitchOffsets=[Math.round(cycleMs*0.072),Math.round(cycleMs*0.412),Math.round(cycleMs*0.695)];

  const emitOne=()=>{
    if(!splash.isConnected||!sym.isConnected){stopLogoPixelFall();return;}
    const sr=splash.getBoundingClientRect();
    const r=sym.getBoundingClientRect();
    const cx=(r.left-sr.left)+(r.width*0.5);
    const y0=(r.bottom-sr.top)+2;
    const bottomSpread=Math.max(8,r.width*0.16);
    const x0=cx+rand(-bottomSpread,bottomSpread);
    const px=document.createElement('span');
    px.className='logo-pixel';
    px.style.left=`${x0}px`;
    px.style.top=`${y0+rand(-1,4)}px`;
    px.style.setProperty('--size',`${rand(1.8,3.8).toFixed(2)}px`);
    px.style.setProperty('--fall',`${rand(88,188).toFixed(0)}px`);
    px.style.setProperty('--drift',`${rand(-16,16).toFixed(1)}px`);
    px.style.setProperty('--dur',`${rand(1.9,3.4).toFixed(2)}s`);
    px.style.setProperty('--lc',logoTone);
    host.appendChild(px);
    const ttl=parseFloat(px.style.getPropertyValue('--dur'))*1000;
    setTimeout(()=>px.remove(),ttl+160);
  };

  const scheduleCycle=(delay)=>{
    _logoPixelTimer=setTimeout(()=>{
      if(!splash.isConnected||!sym.isConnected){stopLogoPixelFall();return;}
      _logoPixelGlitchTimers=glitchOffsets.map(off=>setTimeout(emitOne,off));
      scheduleCycle(cycleMs);
    },delay);
  };

  _logoPixelGlitchTimers=glitchOffsets.map(off=>setTimeout(emitOne,off));
  scheduleCycle(cycleMs);
}
function startEntrarSparks(){
  stopEntrarSparks();
  return;
}

function animateNameReveal(el, greekName, realName, onDone){
  stopNameDrift(el);
  if(!el)return;

  const len=Math.max(greekName.length, realName.length);
  const greek=(greekName||'').toUpperCase().padEnd(len,' ').split('');
  const real=(realName||'').toUpperCase().padEnd(len,' ').split('');
  const latinPool='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const glitchPool='ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ01#@%*';

  const randomOrder=()=>[...Array(len).keys()].sort(()=>Math.random()-0.5);
  const randFrom=(pool)=>pool[Math.floor(Math.random()*pool.length)];

  el.style.opacity='1';
  el.textContent=greek.join('');

  // Fase 1: desde griego, letras aleatorias se van convirtiendo hasta quedar en español
  const phase1=()=>{
    const order=randomOrder();
    const cur=[...greek];
    let i=0;
    const iv=setInterval(()=>{
      if(!el.isConnected){clearInterval(iv);return;}
      if(i>=order.length){
        clearInterval(iv);
        el.textContent=real.join('');
        setTimeout(phase2,720);
        return;
      }

      // ruido aleatorio previo para dar transición orgánica
      const remaining=order.slice(i);
      const burst=Math.min(1,remaining.length);
      for(let k=0;k<burst;k++){
        const ridx=remaining[Math.floor(Math.random()*remaining.length)];
        cur[ridx]=randFrom(latinPool);
      }

      const idx=order[i];
      cur[idx]=real[idx];
      el.textContent=cur.join('');
      i++;
    },180);
  };

  // Fase 2: glitch de limpieza tipo matrix y retorno al griego anterior
  const phase2=()=>{
    const order=randomOrder();
    const cur=[...real];
    let i=0;
    const iv=setInterval(()=>{
      if(!el.isConnected){clearInterval(iv);return;}
      if(i>=order.length){
        clearInterval(iv);
        el.textContent=greekName;
        if(onDone)onDone();
        return;
      }

      // efecto "defecto" matrix antes de limpiar la letra
      const idx=order[i];
      cur[idx]=randFrom(glitchPool);
      el.textContent=cur.join('');

      setTimeout(()=>{
        if(!el.isConnected)return;
        cur[idx]=greek[idx];
        el.textContent=cur.join('');
      },95);

      i++;
    },155);
  };

  phase1();
}

function morphOmitirToEntrar(stepMs=55){
  const om=$('splash-omitir');
  if(!om)return;

  const from=(om.textContent||'omitir').trim()||'omitir';
  const to='entrar';
  if(from===to){
    om.onclick=dismissSplash;
    return;
  }

  const len=Math.max(from.length,to.length);
  const fromP=from.padEnd(len,' ');
  const toP=to.padEnd(len,' ');
  const indices=[...Array(len).keys()].sort(()=>Math.random()-0.5);
  let cur=fromP.split('');
  let i=0;
  const speed=Math.max(25,Number(stepMs)||55);

  om.style.display='block';
  om.style.opacity='1';
  om.style.transition='none';

  const iv=setInterval(()=>{
    if(i>=len){
      clearInterval(iv);
      om.textContent=to;
      om.classList.add('entrar-glow');
      om.onclick=dismissSplash;
      return;
    }
    cur[indices[i]]=toP[indices[i]];
    om.textContent=cur.join('');
    i++;
  },speed);
}
